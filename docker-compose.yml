# Local full-stack run: PosSSaS API + SQL Server 2022.
#   docker compose up --build
# API:     http://localhost:8080/swagger
# Health:  http://localhost:8080/health
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: posssas-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Your_strong_Pass123}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$MSSQL_SA_PASSWORD\" -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: posssas-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=PosSSaS;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_strong_Pass123};TrustServerCertificate=True;MultipleActiveResultSets=true"
      Jwt__Key: "${JWT_KEY:-local-dev-only-change-me-to-a-long-random-secret-32+}"
      Cors__AllowedOrigins__0: "http://localhost:5173"
      Cors__AllowedOrigins__1: "http://localhost:3000"
    ports:
      - "8080:8080"

volumes:
  mssql-data:
